name: QA Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Build Next.js App
      run: npm run build

    - name: Start Next.js App in Background
      run: npm run start &

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Selenium and Testing Tools
      run: |
        pip install -r requirements.txt

    - name: Wait for Next.js to be ready
      run: npx wait-on http://localhost:3000 --timeout 10000

    - name: Run Selenium Tests (Headless)
      run: |
        pytest tests/test_dashboard.py --verbose